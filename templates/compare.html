{% extends "base.html" %}
{% block title %}Compare "{{ query }}" — NepCompare{% endblock %}

{% block content %}
<section class="compare-page py-4">
    <div class="container">
        <div class="text-center mb-4">
            <h2 class="fw-700"><i class="bi bi-arrow-left-right text-accent"></i> Price Comparison</h2>
            <p class="text-muted">Find the best price for "{{ query }}" across all stores</p>
        </div>

        <!-- Comparison Results -->
        <div id="compare-content">
            <div class="text-center py-5">
                <div class="spinner-border text-accent" role="status"></div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/charts.js"></script>
<script>
const COMPARE_QUERY = "{{ query }}";

document.addEventListener('DOMContentLoaded', () => {
    if (!COMPARE_QUERY) {
        document.getElementById('compare-content').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-search fs-1 text-muted"></i>
                <h5 class="mt-3">Enter a product name to compare</h5>
                <form action="/compare" method="GET" class="mt-3" style="max-width:400px;margin:auto;">
                    <div class="input-group">
                        <input type="text" name="q" class="form-control" placeholder="e.g. iPhone 15, Samsung S24...">
                        <button class="btn btn-accent">Compare</button>
                    </div>
                </form>
            </div>`;
        return;
    }

    fetch(`/api/compare?q=${encodeURIComponent(COMPARE_QUERY)}`).then(r => r.json()).then(data => {
        if (!data.all || data.all.length === 0) {
            document.getElementById('compare-content').innerHTML = `
                <div class="text-center py-5">
                    <i class="bi bi-emoji-frown fs-1 text-muted"></i>
                    <h5 class="mt-3">No products found for "${COMPARE_QUERY}"</h5>
                    <a href="/search?q=${encodeURIComponent(COMPARE_QUERY)}" class="btn btn-accent mt-2">Search Instead</a>
                </div>`;
            return;
        }

        const cheapest = data.cheapest;
        let html = '';

        // Summary
        html += `<div class="glass-card p-4 mb-4">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h5 class="fw-700">Found ${data.total} results across ${Object.keys(data.by_store).length} stores</h5>
                    <p class="mb-0 text-muted">Best price: <strong class="text-success fs-5">Rs. ${cheapest.price?.toLocaleString()}</strong> at <strong>${cheapest.store}</strong></p>
                </div>
                <div class="col-md-4 text-md-end mt-2 mt-md-0">
                    <a href="${cheapest.product_url}" target="_blank" class="btn btn-success">
                        <i class="bi bi-cart-check"></i> Buy at Best Price
                    </a>
                </div>
            </div>
        </div>`;

        // Comparison table
        html += `<div class="glass-card p-4 mb-4">
            <h5 class="fw-700 mb-3">Price Comparison Table</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead><tr>
                        <th>Product</th><th>Store</th><th>Price</th>
                        <th>Original</th><th>Discount</th><th>Rating</th><th></th>
                    </tr></thead>
                    <tbody>`;

        data.all.forEach(p => {
            const isCheapest = p.id === cheapest.id;
            html += `<tr class="${isCheapest ? 'table-success' : ''}">
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <img src="${p.image_url || '/static/images/placeholder.svg'}" width="40" height="40"
                             class="rounded" style="object-fit:cover;" onerror="this.src='/static/images/placeholder.svg'">
                        <a href="/product/${p.id}" class="text-decoration-none fw-600">${p.name.substring(0, 50)}${p.name.length > 50 ? '...' : ''}</a>
                    </div>
                </td>
                <td><span class="badge bg-primary-subtle text-primary">${p.store}</span></td>
                <td class="fw-700 ${isCheapest ? 'text-success' : ''}">Rs. ${p.price?.toLocaleString()}
                    ${isCheapest ? '<br><span class="badge bg-success">Best Price</span>' : ''}</td>
                <td class="text-muted">${p.original_price ? 'Rs. ' + p.original_price.toLocaleString() : '-'}</td>
                <td>${p.discount > 0 ? '<span class="badge bg-danger">-' + p.discount + '%</span>' : '-'}</td>
                <td class="text-warning">${'★'.repeat(Math.round(p.rating || 0))} <small class="text-muted">${p.rating || '-'}</small></td>
                <td><a href="${p.product_url}" target="_blank" class="btn btn-sm btn-outline-accent">Visit <i class="bi bi-box-arrow-up-right"></i></a></td>
            </tr>`;
        });

        html += `</tbody></table></div></div>`;

        // Store breakdown cards
        html += `<h5 class="fw-700 mb-3"><i class="bi bi-shop text-accent"></i> By Store</h5>
            <div class="row g-3">`;
        Object.entries(data.by_store).forEach(([store, products]) => {
            const best = products[0];
            html += `<div class="col-md-6 col-lg-4">
                <div class="glass-card p-3">
                    <h6 class="fw-700">${store} <span class="badge bg-secondary">${products.length} items</span></h6>
                    <div class="text-accent fw-700 fs-5">From Rs. ${Math.min(...products.map(p=>p.price)).toLocaleString()}</div>
                    <div class="mt-2">
                        ${products.slice(0, 3).map(p => `<div class="small text-muted py-1 border-bottom border-secondary">
                            ${p.name.substring(0, 40)}... — <strong>Rs. ${p.price?.toLocaleString()}</strong>
                        </div>`).join('')}
                    </div>
                </div>
            </div>`;
        });
        html += `</div>`;

        document.getElementById('compare-content').innerHTML = html;
    }).catch(() => {
        document.getElementById('compare-content').innerHTML = '<p class="text-center text-muted py-5">Error loading comparison data</p>';
    });
});
</script>
{% endblock %}
