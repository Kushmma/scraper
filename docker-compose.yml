version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=prod-secret-key-change-me
      - FLASK_DEBUG=0
      - DATABASE_URL=sqlite:///nepcompare.db
      - SCHEDULER_ENABLED=1
      - SCHEDULER_INTERVAL_HOURS=6
    volumes:
      - .:/app
    restart: always
